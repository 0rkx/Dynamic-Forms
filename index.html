<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dynamic Forms</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            },
            keyframes: {
              "accordion-down": {
                from: { height: "0" },
                to: { height: "var(--radix-accordion-content-height)" },
              },
              "accordion-up": {
                from: { height: "var(--radix-accordion-content-height)" },
                to: { height: "0" },
              },
            },
            animation: {
              "accordion-down": "accordion-down 0.2s ease-out",
              "accordion-up": "accordion-up 0.2s ease-out",
            },
          },
        },
      }
    </script>
  <script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^18.3.1/",
    "react": "https://esm.sh/react@^18.3.1",
    "react-dom/": "https://esm.sh/react-dom@^18.3.1/",
    "react-router-dom": "https://esm.sh/react-router-dom@^6.23.1",
    "@google/genai": "https://esm.sh/@google/genai@^0.4.0",
    "tailwind-merge": "https://esm.sh/tailwind-merge@^2.3.0",
    "clsx": "https://esm.sh/clsx@^2.1.1",
    "zustand/": "https://esm.sh/zustand@^4.5.2/",
    "zustand": "https://esm.sh/zustand@^4.5.2",
    "lucide-react": "https://esm.sh/lucide-react@^0.395.0",
    "framer-motion": "https://esm.sh/framer-motion@^11.2.10",
    "recharts": "https://esm.sh/recharts@^2.12.7"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body class="bg-neutral-100 text-neutral-900">
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
